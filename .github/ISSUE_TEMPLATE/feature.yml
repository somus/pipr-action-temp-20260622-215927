name: Feature request
description: Propose a user-visible Pipr capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the user workflow or capability this should unlock.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the public API, config, command, or runtime behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Runtime
        - Config
        - Docker Action
        - Public API
        - Docs
        - Release
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Acceptance criteria
      description: List the checks or behavior that prove this is done.
    validations:
      required: true
