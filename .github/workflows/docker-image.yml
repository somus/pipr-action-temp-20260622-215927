name: Docker image

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push image to GHCR
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  PIPR_GHCR_ACTION_IMAGE: ghcr.io/somus/pipr-action
  PIPR_TEST_ACTION_IMAGE: pipr-action:e2e

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: docker/setup-buildx-action@v4
      - name: Build local image for e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.PIPR_TEST_ACTION_IMAGE }}
      - run: PIPR_ACTION_IMAGE=${{ env.PIPR_TEST_ACTION_IMAGE }} bun run --cwd packages/e2e check:container
      - uses: docker/metadata-action@v6
        if: ${{ inputs.push }}
        id: meta
        with:
          images: ${{ env.PIPR_GHCR_ACTION_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=main
      - uses: docker/login-action@v4
        if: ${{ inputs.push }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish GHCR image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
