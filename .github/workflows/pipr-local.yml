name: pipr local fixture

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pipr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./
        env:
          DEEPSEEK_API_KEY: local-fixture-key
          PIPR_DRY_RUN: "1"
        with:
          config-dir: .pipr
