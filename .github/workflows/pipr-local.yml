name: pipr local fixture

on:
  pull_request:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pipr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare act workspace permissions
        shell: bash
        run: chmod -R a+rX "$GITHUB_WORKSPACE"
      - uses: ./
        env:
          DEEPSEEK_API_KEY: local-fixture-key
          GITHUB_TOKEN: ${{ github.token }}
          PIPR_DRY_RUN: "1"
        with:
          config-dir: packages/runtime/distribution/official-minimal/.pipr
