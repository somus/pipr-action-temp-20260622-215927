name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run check
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: pipr-action:e2e
      - run: PIPR_ACTION_IMAGE=pipr-action:e2e bun run --cwd packages/e2e check:container
