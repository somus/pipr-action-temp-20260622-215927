name: pipr local full-flow fixture

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pipr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare fake GitHub fixture
        shell: bash
        run: |
          cat > test/fixtures/act/github-publication-full.json <<JSON
          {
            "ownerLogin": "github-actions[bot]",
            "headSha": "${{ github.event.pull_request.head.sha }}",
            "issueComments": [],
            "reviewComments": [],
            "reviewCommentPayloads": []
          }
          JSON
          chmod 666 test/fixtures/act/github-publication-full.json
          mkdir -p test/fixtures/act/pi-calls-full
          chmod 777 test/fixtures/act/pi-calls-full
      - uses: ./
        env:
          DEEPSEEK_API_KEY: ${{ github.workspace }}/test/fixtures/act/pi-calls-full
          GITHUB_TOKEN: local-fixture-token
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: ${{ github.workspace }}
          PIPR_ENABLE_TEST_FIXTURES: "1"
          PIPR_GITHUB_FIXTURE_PATH: ${{ github.workspace }}/test/fixtures/act/github-publication-full.json
          PIPR_PI_EXECUTABLE: ${{ github.workspace }}/test/fixtures/act/fake-pi
        with:
          config-dir: packages/runtime/distribution/official-minimal/.pipr
      - name: Assert fake GitHub fixture
        shell: bash
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/assert-act-full-fixture.mjs \
            test/fixtures/act/github-publication-full.json \
            "$EXPECTED_HEAD_SHA" \
            test/fixtures/act/pi-calls-full
