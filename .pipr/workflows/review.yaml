apiVersion: pipr.dev/v1
kind: Workflow
id: pipr/review
description: Default Pi pull request review workflow.
on:
  - pull_request.opened
  - pull_request.synchronize
  - pull_request.reopened
steps:
  - id: review
    uses: core/run-agent
    with:
      agent: pipr/reviewer
  - id: main-comment
    uses: core/main-comment
    with:
      review: ${{ steps.review.outputs.result }}
      template: pipr/main
  - id: inline-comments
    uses: core/inline-comments
    with:
      review: ${{ steps.review.outputs.result }}
