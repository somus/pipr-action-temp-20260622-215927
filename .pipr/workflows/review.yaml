apiVersion: pipr.dev/v1
kind: Workflow
id: pipr/review
description: Default Pi pull request review workflow.
on:
  - pull_request.opened
  - pull_request.synchronize
  - pull_request.reopened
steps:
  - id: review
    uses: pipr/review-default
    output: validated_review
  - id: main-comment
    uses: core/main-comment
    with:
      review:
        from: validated_review
      template: pipr/main
    output: main_comment
  - id: inline-comments
    uses: core/inline-comments
    with:
      review:
        from: validated_review
    output: inline_comments
