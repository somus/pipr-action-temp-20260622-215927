[tools]
bun = "1.3.14"
node = "26.3.0"
act = "0.2.89"
hk = "1.48.0"

[tasks.install]
description = "Install JavaScript dependencies"
run = "bun install"

[tasks.check]
description = "Run repository checks"
run = "bun run check"

[tasks.act-pr]
description = "Run the local pull_request action fixture through act"
run = "bun run act:pr"
