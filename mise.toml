[tools]
bun = "1.3.14"
act = "0.2.89"
hk = "1.48.0"

[tasks.install]
description = "Install JavaScript dependencies"
run = "bun install"

[tasks.check]
description = "Run repository checks"
run = "bun run check"

[tasks.check-actions]
description = "Build local Docker Action image, verify Pi contract, and run act fixtures"
run = "bun run check:actions"
