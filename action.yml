name: pipr
description: Pi-powered pull request automation runtime
inputs:
  config-dir:
    description: pipr configuration directory
    required: false
    default: .pipr
  provider-id:
    description: Trusted pipr provider profile id used by the Action runtime
    required: false
    default: deepseek
  provider:
    description: Trusted Pi provider backend used by the Action runtime
    required: false
    default: deepseek
  model:
    description: Trusted model used by the Action runtime
    required: false
    default: deepseek-v4-pro
  api-key-env:
    description: Trusted environment variable name containing the provider API key
    required: false
    default: DEEPSEEK_API_KEY
outputs:
  main-comment:
    description: Rendered main PR review comment body
  inline-comments:
    description: JSON array of inline review comment publication items
  dropped-findings:
    description: JSON array of findings dropped during validation
  publication:
    description: JSON publication result for main and inline comments
runs:
  using: docker
  image: docker://ghcr.io/somus/pipr-action:main
  args:
    - action
    - --config-dir
    - ${{ inputs.config-dir }}
    - --provider-id
    - ${{ inputs.provider-id }}
    - --provider
    - ${{ inputs.provider }}
    - --model
    - ${{ inputs.model }}
    - --api-key-env
    - ${{ inputs.api-key-env }}
